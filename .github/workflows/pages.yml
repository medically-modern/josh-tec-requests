# Manual fallback deploy. The live site uses Pages "Deploy from a branch"
# (main, / root) with .nojekyll, which publishes automatically on every push.
# If the Pages source is ever switched to "GitHub Actions", run this manually.
name: Deploy GitHub Pages (manual fallback)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
